<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowNest | Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 { color: var(--primary); display: flex; align-items: center; gap: 10px; }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border-bottom: 3px solid var(--primary);
            text-align: center;
        }

        .stat-card h3 { margin: 0; font-size: 14px; color: #888; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: bold; color: var(--primary); }

        /* Main Sections */
        .grid-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #222;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* System Monitor */
        #monitor {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            border: 1px solid #222;
        }

        .log-entry { margin-bottom: 5px; border-left: 3px solid var(--primary); padding-left: 10px; }

        /* Table Style */
        .history-section { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; }
        tr:hover { background: #1a1a1a; }

        @media (max-width: 768px) { .grid-main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-user-shield"></i> GlowNest Admin Dashboard</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Website Orders</h3>
            <p id="totalOrders">0</p>
        </div>
        <div class="stat-card">
            <h3>Server Status</h3>
            <p id="serverStatus" style="font-size: 18px; color: #ff4444;">OFFLINE</p>
        </div>
    </div>

    <div class="grid-main">
        <div class="card">
            <h2><i class="fas fa-wallet"></i> Add User Balance</h2>
            <label>User Email Address</label>
            <input type="email" id="userEmail" placeholder="customer@gmail.com">
            
            <label>Amount (MMK)</label>
            <input type="number" id="amount" placeholder="e.g. 5000">
            
            <label>Admin Secret Password</label>
            <input type="password" id="adminPass" placeholder="Enter Admin Key">
            
            <button onclick="addBalance()">Confirm Addition</button>
        </div>

        <div class="card">
            <h2><i class="fas fa-desktop"></i> System Monitor</h2>
            <div id="monitor">
                <div class="log-entry">Waiting for server connection...</div>
            </div>
            <button onclick="refreshData()" style="margin-top: 15px; background: #333; color: white;">Refresh Stats</button>
        </div>
    </div>

    <div class="card history-section">
        <h2><i class="fas fa-history"></i> Recent Balance Additions</h2>
        <table>
            <thead>
                <tr>
                    <th>User Email</th>
                    <th>Amount</th>
                    <th>Type</th>
                    <th>Date & Time</th>
                </tr>
            </thead>
            <tbody id="historyTable">
                </tbody>
        </table>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:10000/api";

    // Function to add a log to the monitor
    function addLog(msg, isError = false) {
        const monitor = document.getElementById('monitor');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.style.borderLeftColor = isError ? '#ff4444' : '#00ff88';
        entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        monitor.prepend(entry);
    }

    // Main function to fetch data from server
    async function refreshData() {
        try {
            // 1. Check Server & Total Orders
            const orderRes = await fetch(`${API_BASE}/admin/total-orders`);
            const orderData = await orderRes.json();
            if(orderData.success) {
                document.getElementById('totalOrders').innerText = orderData.total;
                document.getElementById('serverStatus').innerText = "ONLINE";
                document.getElementById('serverStatus').style.color = "#00ff88";
            }

            // 2. Fetch Balance History
            const historyRes = await fetch(`${API_BASE}/admin/balance-history`);
            const historyData = await historyRes.json();
            
            const tableBody = document.getElementById('historyTable');
            tableBody.innerHTML = '';

            if(historyData.history) {
                historyData.history.forEach(item => {
                    tableBody.innerHTML += `
                        <tr>
                            <td>${item.email}</td>
                            <td style="color: #00ff88; font-weight: bold;">+${item.amount} MMK</td>
                            <td>${item.type || 'Manual'}</td>
                            <td>${new Date(item.date).toLocaleString()}</td>
                        </tr>
                    `;
                });
            }
            addLog("System statistics updated.");

        } catch (err) {
            document.getElementById('serverStatus').innerText = "OFFLINE";
            document.getElementById('serverStatus').style.color = "#ff4444";
            addLog("Error: Could not connect to backend server.", true);
        }
    }

    // Function to send balance to server
    async function addBalance() {
        const email = document.getElementById('userEmail').value;
        const amount = document.getElementById('amount').value;
        const adminPassword = document.getElementById('adminPass').value;

        if(!email || !amount || !adminPassword) {
            alert("Please fill all fields!");
            return;
        }

        addLog(`Attempting to add ${amount} MMK to ${email}...`);

        try {
            const res = await fetch(`${API_BASE}/admin/add-balance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, amount, adminPassword })
            });

            const data = await res.json();

            if(data.success) {
                addLog(`Success! New user balance: ${data.newBalance} MMK`);
                alert("Balance Added Successfully!");
                refreshData(); // Update table and stats
            } else {
                addLog(`Failed: ${data.error}`, true);
                alert("Error: " + data.error);
            }
        } catch (err) {
            addLog("Critical Network Error during transaction.", true);
        }
    }

    // Initial Load
    refreshData();
    // Auto refresh every 30 seconds
    setInterval(refreshData, 30000);
</script>

</body>
</html>
